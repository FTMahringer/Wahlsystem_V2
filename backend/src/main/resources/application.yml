spring:
  application:
    name: wahlsystem
  profiles:
    active: dev
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

server:
  servlet:
    context-path: /
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mariadb://mariadb:3306/${DB_NAME:wahlsystem_db}
    username: ${DB_USER:wahlsystem_user}
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.mariadb.jdbc.Driver
  data:
    redis:
      host: redis
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
  flyway:
    enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 600000
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:ZGV2LW9ubHktand0LXNlY3JldC1rZXktZm9yLXdhaGxzeXN0ZW0tYXBwbGljYXRpb24tbm90LWZvci1wcm9kdWN0aW9uLXVzZQ==}
    expiration-ms: 86400000 # 24 hours
    refresh-expiration-ms: 604800000 # 7 days

  # Password hashing configuration
  # IMPORTANT: Changing algorithm or pepper invalidates all existing hashes.
  # Store PASSWORD_PEPPER in your .env file, never commit it to source control.
  security:
    password:
      algorithm: bcrypt       # bcrypt | argon2 | scrypt
      pepper: ${PASSWORD_PEPPER:}
      bcrypt:
        strength: 12          # cost factor — each +1 doubles hashing time
      argon2:
        salt-length: 16
        hash-length: 32
        parallelism: 1
        memory: 65536         # KB (64 MB)
        iterations: 3
      scrypt:
        cpu-cost: 65536
        memory-cost: 8
        parallelism: 1
        key-length: 32
        salt-length: 16

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Logging
logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    at.ftmahringer.wahlsystem: DEBUG

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mariadb://mariadb:3306/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: redis
    redis:
      time-to-live: 3600000

# JWT Configuration (Production)
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

  security:
    password:
      algorithm: ${PASSWORD_ALGORITHM:bcrypt}
      pepper: ${PASSWORD_PEPPER}
      bcrypt:
        strength: ${PASSWORD_BCRYPT_STRENGTH:12}
      argon2:
        salt-length: 16
        hash-length: 32
        parallelism: 2
        memory: 131072          # 128 MB for production
        iterations: 4
      scrypt:
        cpu-cost: 131072
        memory-cost: 8
        parallelism: 1
        key-length: 32
        salt-length: 16

# OpenAPI Configuration
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logging
logging:
  level:
    root: WARN
    at.ftmahringer.wahlsystem: INFO

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
