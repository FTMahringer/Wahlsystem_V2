version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    volumes:
      - ../../nginx/prod/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../nginx/prod/ssl:/etc/nginx/ssl:ro
      - frontend_build:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ../../backend
      dockerfile: ../docker/prod/backend.Dockerfile
    container_name: ${PROJECT_NAME}-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mariadb://mariadb:3306/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SERVER_PORT=8080
    expose:
      - "8080"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MariaDB Database (Default)
  mariadb:
    image: mariadb:11.4
    container_name: ${PROJECT_NAME}-mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ../../scripts/backup:/backup
    expose:
      - "3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Alternative: PostgreSQL Database (commented out - uncomment to use instead of MariaDB)
  # db:
  #   image: postgres:16-alpine
  #   container_name: ${PROJECT_NAME}-db
  #   environment:
  #     - POSTGRES_DB=${DB_NAME}
  #     - POSTGRES_USER=${DB_USER}
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ../../scripts/backup:/backup
  #   expose:
  #     - "5432"
  #   networks:
  #     - app-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 1G
  #       reservations:
  #         memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME}-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Optional: phpMyAdmin for production (accessible via VPN or restricted access)
  # Uncomment if you need database management in production
  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin:latest
  #   container_name: ${PROJECT_NAME}-phpmyadmin
  #   environment:
  #     - PMA_HOST=mariadb
  #     - PMA_PORT=3306
  #     - PMA_USER=root
  #     - PMA_PASSWORD=${DB_ROOT_PASSWORD}
  #   ports:
  #     - "127.0.0.1:${PHPMYADMIN_PORT}:80"  # Only accessible locally
  #   depends_on:
  #     - mariadb
  #   networks:
  #     - app-network
  #   restart: unless-stopped

  # Optional: pgAdmin for production (if using PostgreSQL)
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: ${PROJECT_NAME}-pgadmin
  #   environment:
  #     - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
  #     - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   ports:
  #     - "127.0.0.1:${PGADMIN_PORT}:80"  # Only accessible locally
  #   depends_on:
  #     - db
  #   networks:
  #     - app-network
  #   restart: unless-stopped

volumes:
  mariadb_data:
  # postgres_data:
  # pgadmin_data:
  redis_data:
  frontend_build:

networks:
  app-network:
    driver: bridge
