spring:
  application:
    name: wahlsystem
  profiles:
    active: dev
  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

server:
  servlet:
    context-path: /
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mariadb://mariadb:3306/${DB_NAME:wahlsystem_db}
    username: ${DB_USER:wahlsystem_user}
    password: ${DB_PASSWORD:dev_password}
    driver-class-name: org.mariadb.jdbc.Driver
  redis:
    host: redis
    port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
  flyway:
    enabled: false
  cache:
    type: redis
    redis:
      time-to-live: 600000
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

server:
  port: 8080

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:mySecretKey123456789012345678901234567890}
    expiration-ms: 86400000  # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

# OpenAPI Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Logging
logging:
  level:
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    at.ftmahringer.wahlsystem: DEBUG

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mariadb://mariadb:3306/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  redis:
    host: redis
    port: 6379
    password: ${REDIS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: redis
    redis:
      time-to-live: 3600000

# JWT Configuration (Production)
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000

# OpenAPI Configuration
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# Logging
logging:
  level:
    root: WARN
    at.ftmahringer.wahlsystem: INFO

# Management / Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
